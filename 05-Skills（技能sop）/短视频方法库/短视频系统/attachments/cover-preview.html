<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>封面预览 - 做安利跨不过这三关</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a2e;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  .cover {
    width: 800px;
    height: 800px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #FF6B35 0%, #F7C59F 50%, #FF6B35 100%);
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  /* 人物区域 */
  .person-area {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    height: 500px;
    background: radial-gradient(ellipse at center bottom, rgba(255,255,255,0.15) 0%, transparent 70%);
    z-index: 1;
  }

  .person-placeholder {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 380px;
    height: 460px;
    background: linear-gradient(180deg, rgba(255,200,150,0.3) 0%, rgba(180,120,80,0.2) 100%);
    border-radius: 200px 200px 0 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.6);
    font-size: 16px;
    text-align: center;
    border: 2px dashed rgba(255,255,255,0.2);
  }

  .person-placeholder::after {
    content: "你的照片在此\n👤 双手打开讲解";
    white-space: pre;
    line-height: 1.8;
  }

  /* 巨字拆分 */
  .big-words {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
    pointer-events: none;
  }

  .word-block {
    position: absolute;
    font-family: "PingFang SC", "Microsoft YaHei", "SimHei", sans-serif;
    font-weight: 900;
    color: #FDFFA7;
    text-shadow:
      6px 6px 0 #000,
      -3px -3px 0 #000,
      3px -3px 0 #000,
      -3px 3px 0 #000,
      3px 3px 0 #000,
      6px -6px 0 #000,
      -6px 6px 0 #000,
      -6px -6px 0 #000,
      8px 8px 0 rgba(0,0,0,0.3);
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .word-1 {
    top: 30px;
    left: -10px;
    font-size: 160px;
    transform: rotate(-5deg);
    opacity: 0.95;
  }

  .word-2 {
    top: 150px;
    right: -20px;
    font-size: 140px;
    transform: rotate(3deg);
    opacity: 0.9;
  }

  .word-3 {
    top: 260px;
    left: 20px;
    font-size: 130px;
    transform: rotate(-2deg);
    opacity: 0.85;
  }

  .word-4 {
    top: 360px;
    right: 10px;
    font-size: 115px;
    transform: rotate(4deg);
    opacity: 0.8;
  }

  /* 小字副标题 */
  .subtitle {
    position: absolute;
    bottom: 480px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    text-shadow: 3px 3px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
    background: rgba(0,0,0,0.5);
    padding: 8px 24px;
    border-radius: 8px;
    white-space: nowrap;
    backdrop-filter: blur(4px);
  }

  .subtitle span {
    color: #FDFFA7;
  }

  /* 装饰元素 */
  .splat {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    z-index: 0;
  }

  .splat-1 {
    width: 300px;
    height: 300px;
    top: -80px;
    right: -60px;
  }

  .splat-2 {
    width: 200px;
    height: 200px;
    bottom: 100px;
    left: -50px;
  }

  .splat-3 {
    width: 150px;
    height: 150px;
    top: 350px;
    left: 150px;
    background: rgba(253,255,167,0.06);
  }

  /* CTA 角标 */
  .badge {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 3;
    background: #FF3B30;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    padding: 8px 16px;
    border-radius: 6px;
    transform: rotate(5deg);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.3);
  }

  .badge-sub {
    position: absolute;
    bottom: 20px;
    right: 20px;
    z-index: 3;
    background: rgba(0,0,0,0.6);
    color: #FDFFA7;
    font-size: 14px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 6px;
    backdrop-filter: blur(4px);
  }

  /* 操作说明 */
  .instructions {
    margin-top: 30px;
    color: #aaa;
    font-size: 14px;
    text-align: center;
    max-width: 600px;
  }
</style>
</head>
<body>
  <div>
    <div class="cover">
      <!-- 背景装饰 -->
      <div class="splat splat-1"></div>
      <div class="splat splat-2"></div>
      <div class="splat splat-3"></div>

      <!-- 人物位置 -->
      <div class="person-area">
        <div class="person-placeholder"></div>
      </div>

      <!-- 巨字拆分 -->
      <div class="big-words">
        <div class="word-block word-1">做</div>
        <div class="word-block word-2">安</div>
        <div class="word-block word-3">利</div>
        <div class="word-block word-4">?</div>
      </div>

      <!-- 副标题 -->
      <div class="subtitle">
        跨不过这三关 · <span>95%</span> 都倒下了
      </div>

      <!-- 角标 -->
      <div class="badge">🔥 必看</div>
      <div class="badge-sub">大健康创业 · 第2条</div>
    </div>

    <div class="instructions">
      📌 这是封面设计稿 · 人物区域已预留你的照片位置<br>
      设计参数：1:1 方图 | 巨字拆分冲击风 | 高饱和撞色背景 | #FDFFA7+黑描边
    </div>
  </div>
</body>
</html>
