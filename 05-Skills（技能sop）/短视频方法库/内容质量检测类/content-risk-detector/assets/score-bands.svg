<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">AI Detector score bands</title>
  <desc id="desc">Score bands for low, mixed, and high AI-like signal results.</desc>
  <rect width="960" height="360" rx="24" fill="#ffffff"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="48" y="64" font-size="34" font-weight="800" fill="#101828">Score Bands</text>
    <text x="48" y="100" font-size="18" fill="#475467">Scores are evidence prompts, not authorship verdicts.</text>
    <g transform="translate(48 150)">
      <rect width="864" height="42" rx="21" fill="#e5e7eb"/>
      <rect width="389" height="42" rx="21" fill="#22c55e"/>
      <rect x="389" width="216" height="42" fill="#f59e0b"/>
      <rect x="605" width="259" height="42" rx="21" fill="#ef4444"/>
      <line x1="389" y1="-16" x2="389" y2="58" stroke="#344054" stroke-width="2"/>
      <line x1="605" y1="-16" x2="605" y2="58" stroke="#344054" stroke-width="2"/>
      <text x="0" y="84" font-size="16" font-weight="800" fill="#344054">0</text>
      <text x="374" y="84" font-size="16" font-weight="800" fill="#344054">45</text>
      <text x="590" y="84" font-size="16" font-weight="800" fill="#344054">70</text>
      <text x="834" y="84" font-size="16" font-weight="800" fill="#344054">100</text>
    </g>
    <g transform="translate(48 270)">
      <rect width="246" height="54" rx="12" fill="#ecfdf3"/>
      <text x="20" y="35" font-size="18" font-weight="800" fill="#047857">Low AI-like signal</text>
      <rect x="309" width="246" height="54" rx="12" fill="#fffbeb"/>
      <text x="329" y="35" font-size="18" font-weight="800" fill="#92400e">Mixed or uncertain</text>
      <rect x="618" width="246" height="54" rx="12" fill="#fef2f2"/>
      <text x="638" y="35" font-size="18" font-weight="800" fill="#b91c1c">High AI-like signal</text>
    </g>
  </g>
</svg>
