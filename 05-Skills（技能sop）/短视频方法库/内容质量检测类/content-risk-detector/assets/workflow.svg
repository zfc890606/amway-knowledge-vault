<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">AI Detector Skill workflow</title>
  <desc id="desc">Workflow from text input to score, signals, caveats, and next steps.</desc>
  <rect width="960" height="420" rx="24" fill="#f8fafc"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="48" y="70" font-size="34" font-weight="800" fill="#101828">Responsible Detection Flow</text>
    <text x="48" y="108" font-size="18" fill="#475467">A detector report should help review writing, not accuse authors.</text>
    <g transform="translate(48 166)">
      <rect width="172" height="128" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="24" y="45" font-size="20" font-weight="800" fill="#0f172a">1. Text</text>
      <text x="24" y="78" font-size="15" fill="#475467">essay, email,</text>
      <text x="24" y="100" font-size="15" fill="#475467">review, article</text>
    </g>
    <path d="M232 230 H302" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <path d="M292 216 L306 230 L292 244" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(318 166)">
      <rect width="172" height="128" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="24" y="45" font-size="20" font-weight="800" fill="#0f172a">2. Signals</text>
      <text x="24" y="78" font-size="15" fill="#475467">burstiness,</text>
      <text x="24" y="100" font-size="15" fill="#475467">markers, shape</text>
    </g>
    <path d="M502 230 H572" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <path d="M562 216 L576 230 L562 244" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(588 166)">
      <rect width="172" height="128" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
      <text x="24" y="45" font-size="20" font-weight="800" fill="#0f172a">3. Report</text>
      <text x="24" y="78" font-size="15" fill="#475467">score, confidence,</text>
      <text x="24" y="100" font-size="15" fill="#475467">caveats</text>
    </g>
    <path d="M772 230 H842" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
    <path d="M832 216 L846 230 L832 244" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(48 326)">
      <rect width="864" height="50" rx="25" fill="#101828"/>
      <text x="28" y="33" font-size="17" font-weight="700" fill="#ffffff">Output language: "AI-like signals are present" · never "proof" · recommend human review for high-stakes use</text>
    </g>
    <g transform="translate(858 166)">
      <rect width="54" height="128" rx="14" fill="#ecfdf3" stroke="#86efac"/>
      <text x="18" y="76" font-size="26" font-weight="900" fill="#047857">✓</text>
    </g>
  </g>
</svg>
