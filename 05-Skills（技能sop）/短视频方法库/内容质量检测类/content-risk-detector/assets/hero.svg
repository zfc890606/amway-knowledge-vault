    <rect x="34" y="36" width="164" height="18" rx="9" fill="#0f766e"/>
    <rect x="34" y="84" width="436" height="16" rx="8" fill="#d0d5dd"/>
    <rect x="34" y="120" width="384" height="16" rx="8" fill="#d0d5dd"/>
    <rect x="34" y="156" width="438" height="16" rx="8" fill="#d0d5dd"/>
    <rect x="34" y="208" width="468" height="96" rx="16" fill="#ecfdf3"/>
    <path d="M68 260 L124 260 L150 226 L178 282 L215 242 L248 260 L468 260" fill="none" stroke="#059669" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="34" y="332" width="176" height="16" rx="8" fill="#f59e0b"/>
  </g>
  <g transform="translate(678 112)">
