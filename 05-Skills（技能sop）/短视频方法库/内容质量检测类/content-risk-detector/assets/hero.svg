    <text x="0" y="70" fill="#d1e9ff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="600">Evidence over vibes.</text>
    <text x="0" y="120" fill="#e4e7ec" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26">Explainable AI-like text risk analysis</text>
    <text x="0" y="158" fill="#e4e7ec" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26">for Codex, Claude Code, and agents.</text>
    <rect x="0" y="210" width="360" height="74" rx="18" fill="url(#accent)"/>
    <text x="30" y="258" fill="#101828" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="27" font-weight="800">Score + signals + caveats</text>
    <g transform="translate(0 330)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700">
