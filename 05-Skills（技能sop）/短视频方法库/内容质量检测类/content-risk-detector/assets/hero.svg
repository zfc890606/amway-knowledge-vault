<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AI Detector Skill hero</title>
  <desc id="desc">Open-source project hero card for an explainable AI text risk analyzer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101828"/>
      <stop offset="0.52" stop-color="#12343b"/>
      <stop offset="1" stop-color="#22223b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="0.48" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <path d="M0 502 C156 455 239 536 387 490 C514 451 562 358 713 398 C865 438 907 539 1200 461 L1200 630 L0 630 Z" fill="#0f766e" opacity="0.34"/>
  <path d="M0 548 C169 514 258 574 416 533 C583 490 653 438 796 470 C929 500 1002 574 1200 535 L1200 630 L0 630 Z" fill="#f59e0b" opacity="0.20"/>
  <g transform="translate(92 92)">
